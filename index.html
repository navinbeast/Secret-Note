<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Just For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-a:#1a0606; --bg-b:#060202;
    --red:#c23a4b; --red-dim:#7a2230;
    --gold:#e8b04b; --ivory:#f6ece3; --muted:#c9a3a8; --danger:#ff8080;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif; color:var(--ivory);
    background:
      radial-gradient(circle at 50% 0%, rgba(194,58,75,0.28), transparent 55%),
      linear-gradient(180deg, var(--bg-a), var(--bg-b));
    min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;}
  .display{font-family:'Cormorant Garamond',serif;}
  .wrap{max-width:420px;width:100%;text-align:center;animation:fadeUp .6s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
  /* ---- lock / keypad ---- */
  .avatar{width:84px;height:84px;border-radius:50%;object-fit:cover;border:2px solid rgba(232,176,75,0.5);box-shadow:0 0 0 6px rgba(194,58,75,0.15);margin-bottom:16px;background:#2a0d0d;}
  .avatar-fallback{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(160deg,var(--red-dim),#3a0f16);margin:0 auto 16px;}
  .locked-title{font-size:26px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;font-family:'Inter',sans-serif;}
  .locked-hint{color:var(--muted);font-size:12.5px;margin:8px 0 26px;}
  .dots-row{display:flex;justify-content:center;gap:14px;margin-bottom:24px;}
  .pdot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(232,176,75,0.5);background:transparent;transition:background .15s;}
  .pdot.filled{background:var(--gold);border-color:var(--gold);}
  .pdot.shake{animation:shake .35s;}
  @keyframes shake{20%,80%{transform:translateX(3px);}40%,60%{transform:translateX(-5px);}}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:280px;margin:0 auto;}
  .key{aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--ivory);font-size:22px;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;}
  .key:active{background:rgba(232,176,75,0.25);}
  .key.ghost{background:none;border:none;box-shadow:none;cursor:default;}
  .err-text{color:var(--danger);font-size:12.5px;margin-top:14px;min-height:16px;}
  /* ---- intro ---- */
  .icon-circle{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#3a1018,#1a0608);display:flex;align-items:center;justify-content:center;font-size:56px;margin:0 auto 26px;border:1px solid rgba(232,176,75,0.2);}
  .h1{font-size:30px;font-weight:600;margin-bottom:22px;}
  .intro-sub{color:var(--muted);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:19px;margin-bottom:30px;}
  /* ---- countdown ---- */
  .count-row{display:flex;justify-content:center;gap:30px;margin:26px 0 8px;}
  .count-num{font-size:44px;font-weight:600;color:var(--gold);font-family:'Cormorant Garamond',serif;}
  .count-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .completed-label{color:var(--muted);font-size:13px;margin-bottom:6px;}
  /* ---- memories ---- */
  .carousel{position:relative;margin:20px 0;border-radius:16px;overflow:hidden;background:#000;box-shadow:0 14px 34px rgba(0,0,0,0.5);}
  .carousel img{width:100%;display:block;aspect-ratio:4/5;object-fit:cover;}
  .carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;}
  .carousel-nav.prev{left:10px;} .carousel-nav.next{right:10px;}
  .swipe-hint{color:var(--muted);font-size:12px;font-style:italic;font-family:'Cormorant Garamond',serif;margin-bottom:4px;}
  /* ---- letter ---- */
  .heart-seal{width:96px;height:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e2607a,var(--red) 60%,#5a1420 100%);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;border:none;margin:14px auto 8px;box-shadow:0 10px 26px rgba(194,58,75,0.4);transition:transform .2s;}
  .heart-seal:hover{transform:scale(1.05);}
  .letter-card{background:rgba(255,255,255,0.04);border:1px solid rgba(232,176,75,0.2);border-radius:16px;padding:26px 22px;text-align:left;}
  .letter-card h3{margin:0 0 4px;font-size:20px;font-family:'Cormorant Garamond',serif;}
  .letter-card .from{color:var(--muted);font-size:11px;margin-bottom:16px;}
  .letter-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;line-height:1.7;white-space:pre-wrap;min-height:60px;}
  /* ---- buttons ---- */
  .btn{font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;border:none;border-radius:999px;padding:13px 26px;cursor:pointer;background:rgba(232,176,75,0.08);color:var(--gold);border:1px solid rgba(232,176,75,0.35);transition:transform .15s;}
  .btn:active{transform:scale(0.97);}
  .btn:hover{background:rgba(232,176,75,0.16);}
  .btn-solid{background:linear-gradient(180deg,#f0c169,var(--gold));color:#2a1806;border:none;box-shadow:0 6px 16px rgba(232,176,75,0.25);}
  .btn-row{display:flex;gap:10px;margin-top:20px;justify-content:center;}
  .btn-ghost{background:none;color:var(--muted);border:1px solid rgba(255,255,255,0.15);}
  /* ---- composer ---- */
  .panel{max-width:480px;width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:26px;text-align:left;}
  .panel-title{font-size:22px;font-weight:600;margin-bottom:4px;}
  .panel-sub{color:var(--muted);font-size:12.5px;margin-bottom:20px;line-height:1.55;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;}
  .field input, .field textarea{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--ivory);padding:10px 11px;font-family:'Inter',sans-serif;font-size:13.5px;outline:none;}
  .field input:focus, .field textarea:focus{border-color:var(--gold);}
  .field textarea{min-height:90px;resize:vertical;font-family:'Cormorant Garamond',serif;font-size:16px;}
  .row2{display:flex;gap:10px;} .row2>*{flex:1;}
  .img-row{display:flex;gap:8px;margin-bottom:8px;}
  .img-row input{flex:1;}
  .img-row button{background:rgba(226,102,102,0.12);color:var(--danger);border:1px solid rgba(226,102,102,0.4);border-radius:8px;padding:9px 11px;cursor:pointer;font-size:11px;}
  .link-box{background:rgba(0,0,0,0.35);border:1px solid rgba(232,176,75,0.3);border-radius:10px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;word-break:break-all;color:var(--gold);margin:12px 0;}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
  /* ---- misc ---- */
  #admin-trigger{position:fixed;bottom:0;right:0;width:56px;height:56px;opacity:0;background:transparent;border:none;z-index:50;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(20,6,6,0.95);border:1px solid rgba(232,176,75,0.3);color:var(--ivory);padding:10px 18px;border-radius:999px;font-size:12.5px;z-index:200;max-width:90vw;text-align:center;}
  .footnote{position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:9.5px;letter-spacing:0.15em;color:rgba(201,163,168,0.3);text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .heart-burst{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:150;}
  .heart-burst span{position:absolute;bottom:-20px;font-size:20px;animation:rise 2.6s ease-in forwards;}
  @keyframes rise{to{transform:translateY(-100vh) rotate(20deg);opacity:0;}}
</style>
</head>
<body>
<div id="app"></div>
<button id="admin-trigger" aria-hidden="true" tabindex="-1"></button>

<script>
/* =====================================================================
   JUST FOR YOU — static, link-based, free-hosting version
   Recreates the keypad -> intro -> countdown -> memories -> letter flow.
   All content lives in the link itself; no backend required.
   ===================================================================== */

const state = {
  view:'loading', note:null,
  codeDigits:'', codeError:'', shake:false,
  carouselIdx:0, letterTyped:'', audioPlaying:false,
  compose:null, composeLink:'', toast:''
};
const app = document.getElementById('app');
const adminTrigger = document.getElementById('admin-trigger');

function showToast(msg){ state.toast=msg; render(); setTimeout(()=>{ state.toast=''; render(); },2400); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function b64Encode(str){ return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p))); }
function b64Decode(str){ return decodeURIComponent(atob(str).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

/* ---- gzip compression when the browser supports it, so links stay short ---- */
const CAN_GZIP = typeof CompressionStream !== 'undefined' && typeof DecompressionStream !== 'undefined';
async function gzipToBase64(str){
  const cs = new CompressionStream('gzip');
  const writer = cs.writable.getWriter();
  writer.write(new TextEncoder().encode(str));
  writer.close();
  const buf = await new Response(cs.readable).arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = ''; const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk) binary += String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
  return btoa(binary);
}
async function gunzipFromBase64(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const buf = await new Response(ds.readable).arrayBuffer();
  return new TextDecoder().decode(buf);
}
async function encodePayload(payload){
  const json = JSON.stringify(payload);
  if(CAN_GZIP){
    try{ return 'z:' + await gzipToBase64(json); }catch(e){}
  }
  return b64Encode(json);
}
async function decodePayload(raw){
  if(raw.startsWith('z:')) return JSON.parse(await gunzipFromBase64(raw.slice(2)));
  return JSON.parse(b64Decode(raw));
}

/* ---- shorten/expand GitHub-hosted URLs so the link doesn't repeat the full domain per photo ---- */
function shortenGithubUrl(url, owner, repo){
  if(!url || !owner || !repo) return url;
  const prefix = `https://raw.githubusercontent.com/${owner}/${repo}/`;
  return url.startsWith(prefix) ? ('~' + url.slice(prefix.length)) : url;
}
function expandGithubUrl(val, ownerRepo){
  if(val && val.startsWith('~') && ownerRepo) return `https://raw.githubusercontent.com/${ownerRepo}/` + val.slice(1);
  return val;
}

async function boot(){
  const hash = window.location.hash.startsWith('#d=') ? window.location.hash.slice(3) : null;
  if(hash){
    try{
      const note = await decodePayload(decodeURIComponent(hash));
      if(note.gh){
        note.pic = expandGithubUrl(note.pic, note.gh);
        note.audio = expandGithubUrl(note.audio, note.gh);
        if(note.images) note.images = note.images.map(u=>expandGithubUrl(u, note.gh));
      }
      state.note = note; state.view='lock';
    }
    catch(e){ state.note=null; state.view='empty'; }
  } else { state.view='empty'; }
  render();
}

/* ---------------- keypad ---------------- */
function showHint(){
  if(state.note && state.note.hint) showToast(state.note.hint);
  else showToast('No hint was set for this note.');
}
function pressKey(d){
  if(state.codeDigits.length>=4) return;
  state.codeDigits += d;
  render();
  if(state.codeDigits.length===4) setTimeout(checkCode, 180);
}
function backspaceKey(){ state.codeDigits = state.codeDigits.slice(0,-1); render(); }
function checkCode(){
  if(state.codeDigits === String(state.note.code||'')){
    state.codeError=''; state.view='intro'; render();
  } else {
    state.codeError = "That code doesn't match."; state.shake=true; render();
    setTimeout(()=>{ state.codeDigits=''; state.shake=false; state.codeError=''; render(); }, 500);
  }
}

/* ---------------- countdown ---------------- */
function computeCountdown(dateStr){
  const start = new Date(dateStr);
  const now = new Date();
  if(isNaN(start.getTime())) return {years:0,months:0,days:0};
  let years = now.getFullYear()-start.getFullYear();
  let months = now.getMonth()-start.getMonth();
  let days = now.getDate()-start.getDate();
  if(days<0){ months--; const prevMonth=new Date(now.getFullYear(),now.getMonth(),0); days += prevMonth.getDate(); }
  if(months<0){ years--; months+=12; }
  if(years<0) years=0;
  return {years:Math.max(0,years), months:Math.max(0,months), days:Math.max(0,days)};
}

/* ---------------- memories ---------------- */
function carouselMove(dir){
  const n = state.note.images.length;
  state.carouselIdx = (state.carouselIdx+dir+n)%n;
  render();
}

/* ---------------- letter ---------------- */
function openLetter(){
  state.view='letterReveal'; render();
  const full = state.note.message||'';
  state.letterTyped=''; let i=0;
  const step=()=>{
    if(i>=full.length) return;
    state.letterTyped+=full[i]; i++;
    const box=document.getElementById('letter-typewriter');
    if(box) box.textContent = state.letterTyped;
    setTimeout(step, 16);
  };
  step();
}
let letterAudioEl = null;
function playAudio(){
  if(!state.note.audio) return;
  if(!letterAudioEl){
    letterAudioEl = new Audio(state.note.audio);
    letterAudioEl.addEventListener('ended', ()=>{ state.audioPlaying=false; render(); });
    letterAudioEl.addEventListener('error', ()=>{ showToast("Couldn't play that audio link."); state.audioPlaying=false; render(); });
  }
  if(letterAudioEl.paused){ letterAudioEl.play().catch(()=>showToast("Couldn't play that audio link.")); state.audioPlaying=true; }
  else { letterAudioEl.pause(); state.audioPlaying=false; }
  render();
}
function celebrate(){
  const layer = document.createElement('div');
  layer.className='heart-burst';
  const hearts=['💗','💛','✨','💕'];
  for(let i=0;i<22;i++){
    const s = document.createElement('span');
    s.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.animationDelay = (Math.random()*0.6)+'s';
    s.style.fontSize = (14+Math.random()*16)+'px';
    layer.appendChild(s);
  }
  document.body.appendChild(layer);
  setTimeout(()=>layer.remove(), 3200);
}
function restartAll(){
  state.codeDigits=''; state.codeError=''; state.carouselIdx=0; state.view='lock'; render();
}

/* ---------------- composer ---------------- */
adminTrigger.addEventListener('click', ()=>{
  state.compose = {
    pic:'', code:randomCode4(),
    h1:"It's Your Special Day", intro:"I made something special for you...",
    date:'', h2:'Happy Birthday, Love',
    images:[''], letterFrom:'From my heart to yours', message:'', audio:'', hint:'',
    gh:{ owner:'', repo:'', token:'' },
    uploading:{} // e.g. { 'pic':true, 'img0':true, 'audio':true }
  };
  state.composeLink='';
  state.view='compose'; render();
});
function randomCode4(){ return String(Math.floor(1000+Math.random()*9000)); }
function addImageField(){ if(state.compose.images.length<6){ state.compose.images.push(''); render(); } }
function removeImageField(i){ state.compose.images.splice(i,1); if(!state.compose.images.length) state.compose.images.push(''); render(); }
function updateImageField(i,v){ state.compose.images[i]=v; }
function updateGh(field,val){ state.compose.gh[field]=val; }

/* ---- compress an image file client-side, shrinking until it fits GitHub's 1MB simple-upload limit ---- */
function compressImageFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height, quality = 0.82;
        const tryEncode = ()=>{
          const maxW = 1200;
          const scale = Math.min(1, maxW/w);
          const cw = Math.round(w*scale), ch = Math.round(h*scale);
          const canvas = document.createElement('canvas');
          canvas.width=cw; canvas.height=ch;
          canvas.getContext('2d').drawImage(img,0,0,cw,ch);
          canvas.toBlob(blob=>{
            if(!blob){ reject(new Error('Could not process image')); return; }
            if(blob.size > 900*1024 && (quality>0.4 || w>600)){
              if(quality>0.4) quality -= 0.12; else w = Math.round(w*0.85);
              tryEncode();
            } else {
              resolve(blob);
            }
          }, 'image/jpeg', quality);
        };
        tryEncode();
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

/* ---- push a file into the GitHub repo via the Contents API, return its raw URL ---- */
async function uploadToGithub(blob, filenameHint){
  const gh = state.compose.gh;
  if(!gh.owner.trim() || !gh.repo.trim() || !gh.token.trim()){
    throw new Error('Fill in your GitHub username, repository, and token first.');
  }
  if(blob.size > 1024*1024){
    throw new Error('That file is over 1MB — too big for direct upload. Upload it via github.com instead and paste the link.');
  }
  const base64 = await blobToBase64(blob);
  const path = 'uploads/' + Date.now() + '_' + filenameHint.replace(/[^a-zA-Z0-9._-]/g,'');
  const res = await fetch(`https://api.github.com/repos/${gh.owner.trim()}/${gh.repo.trim()}/contents/${path}`, {
    method:'PUT',
    headers:{
      'Authorization':'token ' + gh.token.trim(),
      'Accept':'application/vnd.github+json',
      'Content-Type':'application/json'
    },
    body: JSON.stringify({ message:'add file via composer', content: base64 })
  });
  if(!res.ok){
    const body = await res.json().catch(()=>({}));
    throw new Error(body.message || ('GitHub said: ' + res.status));
  }
  const data = await res.json();
  return data.content.download_url;
}

async function handleImageUpload(i, file){
  if(!file) return;
  state.compose.uploading['img'+i] = true; render();
  try{
    const blob = await compressImageFile(file);
    const url = await uploadToGithub(blob, 'photo.jpg');
    state.compose.images[i] = url;
    showToast('Photo uploaded.');
  }catch(e){ showToast(e.message); }
  state.compose.uploading['img'+i] = false; render();
}

async function handlePicUpload(file){
  if(!file) return;
  state.compose.uploading['pic'] = true; render();
  try{
    const blob = await compressImageFile(file);
    const url = await uploadToGithub(blob, 'avatar.jpg');
    state.compose.pic = url;
    showToast('Photo uploaded.');
  }catch(e){ showToast(e.message); }
  state.compose.uploading['pic'] = false; render();
}

async function handleAudioUpload(file){
  if(!file) return;
  state.compose.uploading['audio'] = true; render();
  try{
    const url = await uploadToGithub(file, file.name || 'audio');
    state.compose.audio = url;
    showToast('Audio uploaded.');
  }catch(e){ showToast(e.message); }
  state.compose.uploading['audio'] = false; render();
}

async function generateLink(){
  const c = state.compose;
  const code = (c.code||'').trim();
  if(!/^\d{4}$/.test(code)){ showToast('Code must be exactly 4 digits.'); return; }
  if(!c.date){ showToast('Please pick the date to count from.'); return; }
  if(!c.message.trim()){ showToast('Please write the letter.'); return; }

  const owner = c.gh.owner.trim(), repo = c.gh.repo.trim();
  const ghTag = (owner && repo) ? (owner+'/'+repo) : null;
  const shorten = (u)=> ghTag ? shortenGithubUrl(u, owner, repo) : u;

  const payload = {
    gh: ghTag,
    pic: c.pic.trim() ? shorten(c.pic.trim()) : null,
    code: code,
    h1: c.h1.trim() || "It's Your Special Day",
    intro: c.intro.trim(),
    hint: c.hint.trim() || null,
    date: c.date,
    h2: c.h2.trim() || 'Happy Birthday',
    images: c.images.map(u=>u.trim()).filter(Boolean).slice(0,6).map(shorten),
    letterFrom: c.letterFrom.trim(),
    message: c.message,
    audio: c.audio.trim() ? shorten(c.audio.trim()) : null
  };
  showToast('Generating…');
  const encoded = encodeURIComponent(await encodePayload(payload));
  state.composeLink = window.location.origin + window.location.pathname + '#d=' + encoded;
  render();
}
function copyComposeLink(){ navigator.clipboard.writeText(state.composeLink).then(()=>showToast('Link copied.')).catch(()=>{}); }
function previewComposeLink(){ if(state.composeLink) window.open(state.composeLink,'_blank'); }

/* ---------------- render ---------------- */
function render(){
  let html='';

  if(state.view==='loading'){
    html = `<div class="wrap"><div class="eyebrow">please wait</div><div class="locked-title">Opening…</div></div>`;
  }

  else if(state.view==='empty'){
    html = `<div class="wrap"><div class="eyebrow">just for you</div><div class="locked-title" style="font-size:20px;">Nothing to open yet</div><div class="locked-hint">This page shows something only when opened from its own link.</div></div>`;
  }

  else if(state.view==='lock' && state.note){
    const n = state.note;
    html = `<div class="wrap">
      ${n.pic ? `<img class="avatar" style="cursor:pointer;" onclick="showHint()" src="${n.pic}" onerror="this.outerHTML='<div class=avatar-fallback onclick=showHint()>🔒</div>'" />` : `<div class="avatar-fallback" style="cursor:pointer;" onclick="showHint()">🔒</div>`}
      <div class="locked-title">Locked</div>
      <div class="locked-hint">${n.hint ? 'Hint — tap the photo above' : 'Enter the code to continue'}</div>
      <div class="dots-row">${[0,1,2,3].map(i=>`<span class="pdot ${i<state.codeDigits.length?'filled':''} ${state.shake?'shake':''}"></span>`).join('')}</div>
      <div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(d=>`<button class="key" onclick="pressKey('${d}')">${d}</button>`).join('')}
        <span class="key ghost"></span>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key" onclick="backspaceKey()">⌫</button>
      </div>
      <div class="err-text">${state.codeError}</div>
    </div>`;
  }

  else if(state.view==='intro' && state.note){
    const n = state.note;
    html = `<div class="wrap">
      <div class="icon-circle">💤</div>
      <div class="h1 display">${escapeHtml(n.h1)}</div>
      <div class="intro-sub">${escapeHtml(n.intro)}</div>
      <button class="btn btn-solid" onclick="state.view='countdown'; render();">Start</button>
    </div>`;
  }

  else if(state.view==='countdown' && state.note){
    const n = state.note;
    const cd = computeCountdown(n.date);
    html = `<div class="wrap">
      <div class="h1 display">${escapeHtml(n.h2)}</div>
      <div class="completed-label">You have completed</div>
      <div class="count-row">
        <div><div class="count-num">${cd.years}</div><div class="count-label">years</div></div>
        <div><div class="count-num">${cd.months}</div><div class="count-label">months</div></div>
        <div><div class="count-num">${cd.days}</div><div class="count-label">days</div></div>
      </div>
      <div class="btn-row" style="justify-content:center;"><button class="btn btn-solid" onclick="state.view='memories'; render();">Next</button></div>
    </div>`;
  }

  else if(state.view==='memories' && state.note){
    const n = state.note;
    const hasImages = n.images && n.images.length>0;
    html = `<div class="wrap">
      <div class="h1 display" style="font-size:26px;">Special Memories</div>
      <div class="swipe-hint">${hasImages && n.images.length>1 ? 'Use the arrows for more ✦' : ''}</div>
      ${hasImages ? `
      <div class="carousel">
        <img src="${n.images[state.carouselIdx]}" alt="" onerror="this.style.opacity=0.15" />
        ${n.images.length>1 ? `<button class="carousel-nav prev" onclick="carouselMove(-1)">‹</button><button class="carousel-nav next" onclick="carouselMove(1)">›</button>` : ''}
      </div>` : `<div class="hint">No photos were added to this note.</div>`}
      <button class="btn btn-solid" style="margin-top:10px;" onclick="state.view='letterIntro'; render();">✎ Message</button>
    </div>`;
  }

  else if(state.view==='letterIntro' && state.note){
    const n = state.note;
    html = `<div class="wrap">
      <div class="h1 display" style="font-size:24px;">A Letter, Just For You</div>
      <div class="intro-sub">Tap the heart to unseal your message…</div>
      <button class="heart-seal" onclick="openLetter()">♥</button>
      <div class="hint">tap to open</div>
    </div>`;
  }

  else if(state.view==='letterReveal' && state.note){
    const n = state.note;
    html = `<div class="wrap">
      <div class="letter-card">
        <h3>Just For You ✦</h3>
        <div class="from">${escapeHtml(n.letterFrom||'')}</div>
        <div class="letter-text" id="letter-typewriter"></div>
      </div>
      ${n.audio ? `<button class="btn" style="margin-top:14px;" onclick="playAudio()"><span class="audio-dot ${state.audioPlaying?'playing':''}" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-right:8px;"></span>${state.audioPlaying?'Playing…':'▸ Play a little something'}</button>` : ''}
      <div class="btn-row">
        <button class="btn btn-solid" onclick="celebrate()">Celebrate ✦</button>
        <button class="btn btn-ghost" onclick="restartAll()">Restart ⟲</button>
      </div>
    </div>`;
  }

  else if(state.view==='compose'){
    const c = state.compose;
    const up = c.uploading;
    html = `<div class="panel">
      <div class="panel-title">Create a note</div>
      <div class="panel-sub">Fill this in, generate a link, and send <em>that generated link</em> — not this page.</div>

      <div class="field" style="background:rgba(232,176,75,0.05);border:1px solid rgba(232,176,75,0.2);border-radius:10px;padding:12px;">
        <label style="color:var(--gold);">Connect your GitHub repo (so photos upload automatically)</label>
        <div class="row2" style="margin-top:8px;">
          <input type="text" value="${escapeHtml(c.gh.owner)}" oninput="updateGh('owner', this.value)" placeholder="GitHub username" />
          <input type="text" value="${escapeHtml(c.gh.repo)}" oninput="updateGh('repo', this.value)" placeholder="Repository name" />
        </div>
        <input type="password" style="margin-top:8px;" value="${escapeHtml(c.gh.token)}" oninput="updateGh('token', this.value)" placeholder="Personal access token" />
        <div class="hint">Needs a fine-grained token scoped to just this repo with "Contents: Read and write." It's only used from your browser to talk to GitHub directly — it isn't saved anywhere, including here.</div>
      </div>

      <div class="row2">
        <div class="field">
          <label>Their photo (for the lock screen)</label>
          <input type="url" value="${escapeHtml(c.pic)}" oninput="state.compose.pic=this.value" placeholder="https://..." />
          <label class="btn btn-ghost" style="display:block;margin-top:6px;text-align:center;padding:8px;font-size:12px;">${up.pic?'Uploading…':'⬆ Upload from device'}<input type="file" accept="image/*" style="display:none" ${up.pic?'disabled':''} onchange="handlePicUpload(this.files[0])"></label>
        </div>
        <div class="field"><label>4-digit code</label><input type="text" maxlength="4" value="${escapeHtml(c.code)}" oninput="state.compose.code=this.value.replace(/\\D/g,'')" style="font-family:'JetBrains Mono',monospace;" /></div>
      </div>
      <div class="field"><label>Passcode hint (shown when they tap the photo)</label><input type="text" value="${escapeHtml(c.hint)}" oninput="state.compose.hint=this.value" placeholder="e.g. the day we met" /></div>
      <div class="row2">
        <div class="field"><label>Intro headline</label><input type="text" value="${escapeHtml(c.h1)}" oninput="state.compose.h1=this.value" /></div>
        <div class="field"><label>Count-from date</label><input type="date" value="${escapeHtml(c.date)}" oninput="state.compose.date=this.value" /></div>
      </div>
      <div class="field"><label>Intro subtext</label><input type="text" value="${escapeHtml(c.intro)}" oninput="state.compose.intro=this.value" /></div>
      <div class="field"><label>Countdown headline</label><input type="text" value="${escapeHtml(c.h2)}" oninput="state.compose.h2=this.value" /></div>
      <div class="field">
        <label>Memory photos (up to 6)</label>
        ${c.images.map((url,i)=>`
          <div class="img-row">
            <input type="url" value="${escapeHtml(url)}" placeholder="https://..." oninput="updateImageField(${i}, this.value)" />
            <label class="btn btn-ghost" style="padding:9px 12px;font-size:11px;white-space:nowrap;">${up['img'+i]?'…':'⬆ Upload'}<input type="file" accept="image/*" style="display:none" ${up['img'+i]?'disabled':''} onchange="handleImageUpload(${i}, this.files[0])"></label>
            <button onclick="removeImageField(${i})">✕</button>
          </div>`).join('')}
        ${c.images.length<6 ? `<button class="btn btn-ghost" style="padding:8px 14px;font-size:12px;" onclick="addImageField()">+ Add another photo</button>` : ''}
      </div>
      <div class="field"><label>Letter "from" line</label><input type="text" value="${escapeHtml(c.letterFrom)}" oninput="state.compose.letterFrom=this.value" /></div>
      <div class="field"><label>The letter</label><textarea oninput="state.compose.message=this.value" placeholder="Write what you want them to read...">${escapeHtml(c.message)}</textarea></div>
      <div class="field">
        <label>Audio (optional — a small "play" button appears with the letter)</label>
        <div class="img-row">
          <input type="url" value="${escapeHtml(c.audio)}" oninput="state.compose.audio=this.value" placeholder="https://..." />
          <label class="btn btn-ghost" style="padding:9px 12px;font-size:11px;white-space:nowrap;">${up.audio?'…':'⬆ Upload'}<input type="file" accept="audio/*" style="display:none" ${up.audio?'disabled':''} onchange="handleAudioUpload(this.files[0])"></label>
        </div>
        <div class="hint">Direct upload only works for files under 1MB (roughly 20–30 seconds of audio). For longer clips, upload manually on github.com and paste the link.</div>
      </div>
      <button class="btn btn-solid" style="width:100%;" onclick="generateLink()">Generate the link</button>
      ${state.composeLink ? `
        <div class="link-box">${escapeHtml(state.composeLink)}</div>
        <div class="row2"><button class="btn btn-ghost" onclick="previewComposeLink()">Preview</button><button class="btn btn-solid" onclick="copyComposeLink()">Copy link</button></div>
      ` : ''}
      <div class="hint" style="margin-top:16px;">This page has no server, so the code is a nice-to-open gate, not real security — anyone inspecting the link's data could technically read it. Fine for a sweet surprise, not for anything that truly can't leak.</div>
    </div>`;
  }

  html += `<div class="footnote">just for you</div>`;
  if(state.toast) html += `<div class="toast">${escapeHtml(state.toast)}</div>`;
  app.innerHTML = html;
}

boot();
</script>
</body>
</html>
